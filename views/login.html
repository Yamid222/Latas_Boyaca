<div class="login-screen" id="loginScreen" aria-hidden="false">
    <div class="login-card">
      <div class="login-banner">
        <img src="assets/img/or.png" alt="Latas Boyacá">
      </div>
      <div class="login-brand">
        <div>
          <h1>Latas Boyacá</h1>
        </div>
      </div>

      <!-- ── Formulario de inicio de sesión ── -->
      <div id="loginFormWrap">
        <p class="subtitle">Ingresa a tu panel administrativo.</p>
        <p class="login-error" id="loginError" role="alert" hidden></p>
        <form id="loginForm" novalidate>
          <div class="field">
            <label for="email">Correo electrónico</label>
            <input type="email" id="email" name="email" placeholder="admin@latasboyaca.com" autocomplete="username">
          </div>
          <div class="field">
            <label for="password">Contraseña</label>
            <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password">
          </div>
          <button type="submit" class="btn btn-primary">Iniciar sesión</button>
        </form>
        <p style="margin-top:.85rem;text-align:center;font-size:.85rem;">
          <a href="#" id="linkOlvidePass" style="color:var(--accent);">¿Olvidaste tu contraseña?</a>
        </p>
      </div>

      <!-- ── Paso 1: solicitar código ── -->
      <div id="recupStep1" hidden>
        <p class="subtitle">Ingresa tu correo y te enviaremos un código de 6 dígitos.</p>
        <p class="login-error" id="recupError1" role="alert" hidden></p>
        <div class="field">
          <label for="recupEmail">Correo electrónico</label>
          <input type="email" id="recupEmail" placeholder="tu@correo.com" autocomplete="email">
        </div>
        <button type="button" class="btn btn-primary" id="recupBtnEnviar">Enviar código</button>
        <p style="margin-top:.85rem;text-align:center;font-size:.85rem;">
          <a href="#" id="linkVolverLogin" style="color:var(--accent);">Volver al inicio de sesión</a>
        </p>
      </div>

      <!-- ── Paso 2: código + nueva contraseña ── -->
      <div id="recupStep2" hidden>
        <p class="subtitle">Ingresa el código recibido y tu nueva contraseña.</p>
        <p class="login-error" id="recupError2" role="alert" hidden></p>
        <p id="recupDevNota" class="login-hint" hidden></p>
        <div class="field">
          <label for="recupCodigo">Código de 6 dígitos</label>
          <input type="text" id="recupCodigo" maxlength="6" placeholder="123456" autocomplete="one-time-code"
                 style="letter-spacing:.25em;font-size:1.15rem;text-align:center;">
        </div>
        <div class="field">
          <label for="recupNewPass">Nueva contraseña</label>
          <input type="password" id="recupNewPass" placeholder="Mínimo 6 caracteres" autocomplete="new-password">
        </div>
        <div class="field">
          <label for="recupConfPass">Confirmar contraseña</label>
          <input type="password" id="recupConfPass" placeholder="Repite la contraseña" autocomplete="new-password">
        </div>
        <button type="button" class="btn btn-primary" id="recupBtnVerificar">Cambiar contraseña</button>
        <p style="margin-top:.85rem;text-align:center;font-size:.85rem;">
          <a href="#" id="linkVolverEmail" style="color:var(--accent);">← Cambiar correo</a>
        </p>
      </div>

    </div>
  </div>
